  <body>
  <!DOCTYPE html>
<html>
<head>

<title>ResellRadar</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>ResellRadar</h1>
<p class="subtitle">Professional Reselling Profit Analyzer</p>

<div class="tabs">

<button onclick="openTab('analyzer')">Profit Analyzer</button>
<button onclick="openTab('saved')">Saved Flips</button>
<button onclick="openTab('monthly')">Monthly Tracking</button>
<button onclick="openTab('tips')">Reselling Tips</button>

</div>


<!-- ANALYZER TAB -->

<div id="analyzer" class="tab">

<label>Item Name</label>
<input type="text" id="item">

<label>Retail Price</label>
<input type="number" id="retail">

<label>Purchase Price (What You Paid)</label>
<input type="number" id="buy">

<label>Expected Resale Price</label>
<input type="number" id="sell">

<label>Shipping Cost</label>
<input type="number" id="shipping">

<label>Marketplace</label>

<select id="platform">

<option value="0.13">eBay (13%)</option>
<option value="0.10">Mercari (10%)</option>
<option value="0.10">Depop (10%)</option>
<option value="0.12">StockX (12%)</option>
<option value="0.12">GOAT (12%)</option>
<option value="0.10">Poshmark (10%)</option>
<option value="0.05">Facebook Marketplace (5%)</option>

</select>

<label>Item Condition</label>

<select id="condition">

<option>Brand New (Deadstock)</option>
<option>Excellent Condition</option>
<option>Good Condition</option>
<option>Fair Condition</option>
<option>Poor Condition</option>

</select>

<button onclick="analyzeFlip()">Analyze Flip</button>

<h3 id="profit"></h3>
<h3 id="score"></h3>

<button onclick="saveFlip()">Save Flip</button>

</div>


<!-- SAVED TAB -->

<div id="saved" class="tab" style="display:none">

<h2>Saved Reselling Opportunities</h2>

<ul id="savedList"></ul>

</div>


<!-- MONTHLY TRACKING TAB -->

<div id="monthly" class="tab" style="display:none">

<h2>Monthly Profit Tracking</h2>

<p>Total Estimated Profit This Month</p>

<h2 id="monthlyProfit">$0</h2>

</div>


<!-- TIPS TAB -->
<h2>Reselling Tips Assistant</h2>

<p>Ask a reselling question:</p>

<input type="text" id="tipQuestion" placeholder="Example: Best items to flip?">

<button onclick="getTip()">Get Tip</button>

<p id="tipAnswer"></p>

</ul>

</div>

<script src="script.js"></script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
